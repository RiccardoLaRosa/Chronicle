<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org">

<!-- HEAD -->

<head th:insert="~{index :: head}"></head>

<body>

    <!-- HEAD NAVBAR -->

    <head th:insert="~{index :: navbar}"></head>

    <main class="flex-grow-1">
        <div class="container py-5">

            <h2 class="fw-bold mb-4" th:text="${title}">Tutti gli articoli</h2>

            <!-- Griglia articoli -->
            <div class="row g-4" th:unless="${#lists.isEmpty(articles)}">
                <div class="col-md-4" th:each="article : ${articles}">
                    <div class="card h-100 border-0 shadow-sm">

                        <!-- Immagine articolo -->
                        <img th:if="${article.image != null}" th:src="${article.image.path}" class="card-img-top"
                            alt="Immagine articolo" style="height: 200px; object-fit: cover;">

                        <!-- Immagine default -->
                        <img th:unless="${article.image != null}" src="/images/default.jpg" class="card-img-top"
                            alt="Immagine di default" style="height: 200px; object-fit: cover;">

                        <div class="card-body d-flex flex-column">

                            <!-- Categoria -->
                            <span class="text-uppercase fw-semibold mb-1"
                                style="font-size: 11px; letter-spacing: 1px; color: var(--primary);"
                                th:text="${article.category != null ? article.category.name : ''}"></span>

                            <!-- Titolo -->
                            <h5 class="card-title fw-bold" th:text="${article.title}">Titolo</h5>

                            <!-- Corpo -->
                            <p class="card-text text-muted small flex-grow-1" th:text="${article.body}">Corpo</p>


                        </div>
                    </div>
                </div>
            </div>

            <!-- Nessun articolo -->
            <div th:if="${#lists.isEmpty(articles)}" class="text-center py-5">
                <i class="bi bi-journal-x fs-1 text-muted"></i>
                <p class="text-muted mt-3">Nessun articolo presente.</p>
                <a th:href="@{/articles/create}" class="btn btn-main btn-sm mt-2" sec:authorize="isAuthenticated">Scrivi
                    il primo</a>
            </div>

        </div>
    </main>


    <!-- HEAD FOOTER -->

    <head th:insert="~{index :: footer}"></head>

    <!-- SCRIPT BOOTSTRAP -->
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>

</html>
