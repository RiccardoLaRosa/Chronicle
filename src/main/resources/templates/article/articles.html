<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">

<head th:replace="~{index :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{index :: navbar}"></div>

    <main class="flex-grow-1">
        <div class="container py-5">

            <div class="bg-white rounded shadow-sm p-3 mb-4">
                <h2 class="fw-bold mb-0" th:text="${title}">Tutti gli articoli</h2>
            </div>

            <!-- Griglia articoli -->
            <div class="row g-4" th:unless="${#lists.isEmpty(articles)}">
                <div class="col-md-4" th:each="article : ${articles}">
                    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">

                        <!-- Immagine articolo -->
                        <img th:if="${article.image != null}" th:src="${article.image.path}"
                            class="card-img-top object-fit-cover" height="250" alt="Immagine articolo">

                        <!-- Immagine default -->
                        <img th:unless="${article.image != null}" src="/images/no_photo.png"
                            class="card-img-top object-fit-cover" height="250" alt="Immagine di default">

                        <div class="card-body d-flex flex-column">

                            <!-- Categoria tag -->
                            <nav class="mb-3">
                                <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill text-uppercase fw-semibold"
                                    th:text="${article.category != null ? article.category.name : 'Nessuna categoria'}">
                                </span>
                            </nav>

                            <!-- Titolo -->
                            <h5 class="card-title fw-bold" th:text="${article.title}">Titolo</h5>

                            <!-- Corpo -->
                            <p class="card-text text-muted small flex-grow-1" th:text="${article.body}">Corpo</p>

                            <!-- Bottone Dettaglio -->
                            <div class="mt-auto text-end">
                                <a th:href="@{/articles/details/{id}(id=${article.id})}"
                                    class="btn btn-success btn-sm rounded-pill px-3">Dettaglio</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Nessun articolo -->
            <div th:if="${#lists.isEmpty(articles)}" class="text-center py-5">
                <i class="bi bi-journal-x fs-1 text-muted"></i>
                <p class="text-muted mt-3">Nessun articolo presente.</p>
                <a th:href="@{/articles/create}" class="btn btn-success btn-sm mt-2 rounded-pill"
                    sec:authorize="isAuthenticated()">Scrivi il primo</a>
            </div>

        </div>
    </main>

    <div th:replace="~{index :: footer}"></div>
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>

</html>
