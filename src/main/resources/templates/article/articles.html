<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">

<head th:replace="~{index :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{index :: navbar}"></div>

    <main class="flex-grow-1">
        <div class="container py-5">

            <div class="bg-white rounded shadow-sm p-3 mb-4">
                <h2 class="fw-bold mb-0" th:text="${title}">Tutti gli articoli</h2>
            </div>

            <!-- Griglia articoli -->
            <div class="row g-4" th:unless="${#lists.isEmpty(articles)}">
                <div class="col-md-6 col-lg-4" th:each="article : ${articles}">

                    <div class="card h-100 glass-module overflow-hidden shadow">

                        <!-- Immagine articolo incassata -->
                        <div class="p-3">
                            <img th:if="${article.image != null}" th:src="${article.image.path}"
                                class="w-100 object-fit-cover module-img" height="250" alt="Immagine articolo">

                            <img th:unless="${article.image != null}" src="/images/no_photo.png"
                                class="w-100 object-fit-cover module-img" height="250" alt="Immagine di default">
                        </div>

                        <div class="card-body d-flex flex-column pt-2 px-4 pb-4">

                            <div class="d-flex align-items-center mb-3">

                                <div class="border-start border-4 border-success ps-2">
                                    <p class="font-monospace text-uppercase fw-bold text-dark mb-0 lh-1"
                                        th:text="${article.category != null ? article.category.name : 'NONE'}">CATEGORY
                                    </p>
                                </div>

                            </div>

                            <!-- Titolo con spaziatura moderna -->
                            <h4 class="fw-bold mb-2 text-dark" style="letter-spacing: -0.8px; line-height: 1.1;"
                                th:text="${article.title}">Titolo Progetto</h4>

                            <!-- Corpo con linea di lettura pulita -->
                            <p class="text-secondary small flex-grow-1 opacity-75 mb-4"
                                th:text="${#strings.abbreviate(article.body, 100)}">Corpo</p>

                            <!-- Footer del modulo -->
                            <div
                                class="d-flex align-items-center justify-content-between mt-auto pt-3 border-top border-dark border-opacity-10">

                                <div class="d-flex align-items-center">
                                    <div class="user-block" style="width: 10px; height: 10px; border-width: 1.5px;">
                                    </div>
                                    <div><i class="bi bi-person-circle me-2"></i><span class="user-tag"
                                            style="font-size: 13px;" th:text="${article.user.username}"></span></div>
                                </div>

                                <a th:href="@{/articles/details/{id}(id=${article.id})}" class="btn-detail-link">Apri
                                    Dettaglio →</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Nessun articolo -->
            <div th:if="${#lists.isEmpty(articles)}" class="text-center py-5">
                <i class="bi bi-journal-x fs-1 text-muted"></i>
                <p class="text-muted mt-3">Nessun articolo presente.</p>
                <a th:href="@{/articles/create}" class="btn btn-success btn-sm mt-2 rounded-pill"
                    sec:authorize="isAuthenticated()">Scrivi il primo</a>
            </div>

        </div>
    </main>

    <div th:replace="~{index :: footer}"></div>
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>

</html>
