<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">

<head th:replace="~{index :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{index :: navbar}"></div>

    <main class="flex-grow-1">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">

                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">

                            <h2 th:text="${title}" class="text-center mb-1 fw-semibold">Modifica Articolo</h2>
                            <p class="text-center text-muted small mb-4">Modifica i campi che vuoi aggiornare</p>

                            <hr class="mb-4" style="opacity: 0.07;">

                            <!-- FORM EDIT -->
                            <form th:action="@{/articles/update/{id}(id=${article.id})}" th:object="${article}" method="POST" enctype="multipart/form-data">

                                <!-- TITLE -->
                                <div class="form-floating mb-3">

                                    <input type="text" th:field="*{title}" class="form-control rounded-3" placeholder="Titolo">
                                    <label>Titolo</label>

                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                                    
                                </div>

                                <!-- BODY -->
                                <div class="form-floating mb-3">

                                    <textarea th:field="*{body}" class="form-control rounded-3" placeholder="Contenuto" style="height: 150px"></textarea>
                                    <label>Contenuto</label>

                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('body')}" th:errors="*{body}"></div>

                                </div>

                                <!-- DATE -->
                                <div class="form-floating mb-3">

                                    <input type="date" th:field="*{publishDate}" class="form-control rounded-3">
                                    <label>Data pubblicazione</label>

                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('publishDate')}" th:errors="*{publishDate}"></div>

                                </div>

                                <!-- CATEGORY -->
                                <div class="form-floating mb-4">

                                    <select th:field="*{category}" class="form-select rounded-3">
                                        <option value="">Seleziona categoria</option>
                                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                                    </select>

                                    <label>Categoria</label>

                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>

                                </div>

                                <!-- IMAGE -->
                                <div class="mb-3">
                                    <label th:if="${article.image != null}" class="form-label fw-medium small">Immagine attuale</label>
                                    
                                    <div class="mb-2">
                                        <img th:if="${article.image != null}" th:src="${article.image.path}" class="img-thumbnail rounded-3 object-fit-cover" height="120" alt="Immagine attuale">
                                        <span th:unless="${article.image != null}" class="text-muted small">Nessun immagine</span>
                                    </div>

                                    <label class="form-label fw-medium small">Aggiungi immagine</label>
                                    <input type="file" name="file" class="form-control rounded-3">
                                </div>

                                <!-- BUTTONS -->
                                <div class="d-flex gap-2 mt-4">

                                    <button type="submit" class="btn btn-success flex-grow-1 rounded-pill py-2 fw-semibold">Aggiorna articolo</button>

                                    <a href="javascript:history.back()" class="btn rounded-pill px-4 py-2 fw-medium btn-outline-secondary">Annulla</a>

                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{index :: footer}"></div>
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>

</html>
