<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">

<head th:replace="~{index :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{index :: navbar}"></div>

    <main class="flex-grow-1 d-flex align-items-center mb-5">
        <div class="container py-5 mb-5">
            <div class="row justify-content-center mb-5">
                <div class="col-lg-11 col-xl-9">

                    <div class="glass-chassis p-4 p-lg-5">
                        <div class="row align-items-center g-5">
                            
                            <div class="col-md-5">
                                <img th:if="${article.image != null}" th:src="${article.image.path}"
                                    class="w-100 img-modern" style="aspect-ratio: 1/1;">
                                <img th:unless="${article.image != null}" th:src="@{/images/no_photo.png}"
                                    class="w-100 img-modern" style="aspect-ratio: 1/1;">
                            </div>

                            <div class="col-md-7">

                                <div class="d-flex align-items-center mb-4">
                                    <span class="me-1 fs-5 text-success"><i class="bi bi-bookmarks-fill"></i></i></span>
                                    <span class="label-mini" th:text="${article.category?.name ?: 'Standard'}"></span>
                                    <span class="ms-auto label-mini opacity-50">Rev. 2026</span>
                                </div>

                                <h1 class="display-3 fw-bold text-dark mb-4" style="letter-spacing: -2px; line-height: 0.95;" th:text="${article.title}"></h1>

                                <p class="fs-5 text-secondary mb-5 fw-light" th:text="${article.body}"></p>

                                <div class="d-flex align-items-center justify-content-between pt-4 border-top border-light">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="fs-5"><i class="bi bi-pencil-square"></i></span>
                                        <a class="text-muted text-decoration-none btn-user" th:href="@{/search/{id}(id=${article.user.id})}">
                                            <span class="small fw-bold fs-6" th:text="${article.user.username}">user</span>
                                        </a>
                                    </div>
                                    
                                    <div class="d-flex gap-4 align-items-center">
                                        <a href="#" onclick="goBack()" class="text-dark text-decoration-none small opacity-50 fw-bold">indietro</a>
                                        <a th:if="${article.category != null}" th:href="@{/categories/search/{id}(id=${article.category.id})}" class="btn-modern text-decoration-none">esplora_
                                        </a>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{index :: footer}"></div>
    <script th:replace="~{index :: bootstrapScript}"></script>
    
    <script>function goBack() { window.history.back() }</script>

</body>

</html>
