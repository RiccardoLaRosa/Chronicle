<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">

<head th:replace="~{index :: head}"></head>

<body class="d-flex flex-column min-vh-100" style="background-color: #f4f1ea;">

    <div th:replace="~{index :: navbar}"></div>

    <main class="flex-grow-1 py-5">
        <div class="container">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0">Dashboard Admin</h4>
                    <small class="text-muted">Gestione richieste e categorie</small>
                </div>
            </div>

            <div class="row g-4">

                <!-- COLONNA SINISTRA: RICHIESTE -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm rounded-4 p-4">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-semibold mb-0">Richieste utenti</h6>
                            <span class="badge rounded-pill px-3 py-1 bg-success-subtle text-success"
                                th:text="${requests.size()} + ' richieste'">
                            </span>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="text-muted small text-uppercase">
                                    <tr>
                                        <th class="fw-semibold border-0 pb-3">Utente</th>
                                        <th class="fw-semibold border-0 pb-3">Ruolo richiesto</th>
                                        <th class="fw-semibold border-0 pb-3">Stato</th>
                                        <th class="fw-semibold border-0 pb-3">Azioni</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="request : ${requests}">
                                        <td>
                                            <div class="d-flex align-items-center gap-2">
                                                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold bg-success-subtle text-success"
                                                    style="width:32px; height:32px; font-size:12px;">
                                                    <span th:text="${#strings.substring(request.user.username, 0, 1).toUpperCase()}"></span>
                                                </div>
                                                <span class="fw-medium small" th:text="${request.user.username}"></span>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="badge rounded-pill px-3 py-2 bg-secondary-subtle text-secondary"
                                                th:text="${request.role.name.replace('ROLE_', '')}">
                                            </span>
                                        </td>
                                        <td>
                                            <span class="badge rounded-pill px-3 py-2 bg-warning-subtle text-warning">
                                                In attesa
                                            </span>
                                        </td>
                                        <td>
                                            <a th:href="@{/operations/career/request/detail/{id}(id=${request.id})}"
                                                class="btn btn-success btn-sm rounded-pill px-3">
                                                Apri
                                            </a>
                                        </td>
                                    </tr>

                                    <!-- Nessuna richiesta -->
                                    <tr th:if="${requests.isEmpty()}">
                                        <td colspan="4" class="text-center text-muted py-4 small">
                                            Nessuna richiesta disponibile
                                        </td>
                                    </tr>

                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

             <!-- COLONNA DESTRA: CATEGORIE -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-semibold mb-0">Categorie</h6>
                            <a th:href="@{/categories/create}"
                                class="btn btn-success btn-sm rounded-circle d-flex align-items-center justify-content-center fw-bold"
                                style="width:30px; height:30px;">
                                +
                            </a>
                        </div>

                        <ul class="list-unstyled mb-0">
                            <li th:each="category : ${categories}"
                                class="d-flex justify-content-between align-items-center py-2 border-bottom">
                                <span class="small fw-medium" th:text="${category.name}"></span>
                                <div class="d-flex align-items-center gap-2">

                                    <!-- Bottone aggiorna -->
                                    <a th:href="@{/categories/edit/{id}(id=${category.id})}"
                                        class="btn btn-outline-success btn-sm rounded-pill px-2">
                                        Aggiorna
                                    </a>

                                    <!-- Bottone elimina -->
                                    <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="POST" class="m-0">
                                        <input type="hidden" name="_method" value="DELETE">
                                        <button type="submit" class="btn btn-danger btn-sm rounded-pill px-2"
                                            onclick="return confirm('Sei sicuro di voler eliminare questa categoria?')">
                                            Elimina
                                        </button>
                                    </form>

                                </div>
                            </li>

                            <!-- Nessuna categoria -->
                            <li th:if="${categories.isEmpty()}" class="text-center text-muted py-4 small">
                                Nessuna categoria
                            </li>

                        </ul>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- HEAD FOOTER -->

    <head th:insert="~{index :: footer}"></head>

    <!-- SCRIPT BOOTSTRAP -->
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>

</html>
