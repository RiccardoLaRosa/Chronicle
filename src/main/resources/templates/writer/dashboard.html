<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">

<head th:replace="~{index :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div th:replace="~{index :: navbar}"></div>

    <main class="flex-grow-1 py-5">
        <div class="container">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0">Dashboard Writer</h4>
                    <small class="text-muted">Gestione dei tuoi articoli</small>
                </div>
                <a th:href="@{/articles/create}" class="btn btn-success rounded-pill px-4">
                    + Nuovo articolo
                </a>
            </div>

            <!-- TABELLA ARTICOLI -->
            <div class="card border-0 shadow-sm rounded-4 p-4">

                <h6 th:text="${title}" class="fw-semibold mb-3"></h6>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="text-muted small text-uppercase">
                            <tr>
                                <th class="fw-semibold border-0 pb-3">Titolo</th>
                                <th class="fw-semibold border-0 pb-3">Categoria</th>
                                <th class="fw-semibold border-0 pb-3">Data</th>
                                <th class="fw-semibold border-0 pb-3">Stato</th>
                                <th class="fw-semibold border-0 pb-3">Azioni</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="article : ${articles}">

                                <!-- Titolo -->
                                <td class="fw-medium small" th:text="${article.title}"></td>

                                <!-- Categoria -->
                                <td>
                                    <span class="badge rounded-pill px-3 py-1 bg-secondary-subtle text-secondary"
                                        th:text="${article.category != null ? article.category.name : 'Nessuna'}">
                                    </span>
                                </td>

                                <!-- Data -->
                                <td class="small text-muted" th:text="${article.publishDate}"></td>

                                <!-- Stato -->
                                <td>
                                    <span th:if="${article.isAccepted == null}"
                                        class="badge rounded-pill px-3 py-1 bg-warning-subtle text-warning">
                                        In attesa
                                    </span>
                                    <span th:if="${article.isAccepted == true}"
                                        class="badge rounded-pill px-3 py-1 bg-success-subtle text-success">
                                        Accettato
                                    </span>
                                    <span th:if="${article.isAccepted == false}"
                                        class="badge rounded-pill px-3 py-1 bg-danger-subtle text-danger">
                                        Rifiutato
                                    </span>
                                </td>

                                <!-- Azioni -->
                                <td>
                                    <div class="d-flex gap-2">

                                        <!-- Dettaglio -->
                                        <a th:href="@{/articles/details/{id}(id=${article.id})}"
                                            class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                                            Dettaglio
                                        </a>

                                        <!-- Modifica -->
                                        <a th:href="@{/articles/edit/{id}(id=${article.id})}"
                                            class="btn btn-outline-success btn-sm rounded-pill px-3">
                                            Modifica
                                        </a>

                                        <!-- Elimina -->
                                        <form th:action="@{/articles/delete/{id}(id=${article.id})}" method="POST" class="m-0">
                                            <input type="hidden" name="_method" value="DELETE">
                                            <button type="submit"
                                                class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                                onclick="return confirm('Sei sicuro di voler eliminare questo articolo?')">
                                                Elimina
                                            </button>
                                        </form>

                                    </div>
                                </td>

                            </tr>

                            <!-- Nessun articolo -->
                            <tr th:if="${articles.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-4 small">
                                    Non hai ancora scritto nessun articolo.
                                    <a th:href="@{/articles/create}" class="text-success">Scrivi il primo!</a>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </main>

    <div th:replace="~{index :: footer}"></div>
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>

</html>
