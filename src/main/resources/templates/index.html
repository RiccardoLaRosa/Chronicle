<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">

<!-- Fragment Head -->

<head th:fragment="head">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <!-- Titolo -->
    <title th:text="${title}">Title</title>

</head>


<body>

    <!-- FRAGMENT NAVBAR -->
    <div th:fragment="navbar">

        <!-- Inizio Navbar -->
        <nav class="navbar">
            <div class="nav-left">
                <a href="/home" class="nav-link">Home</a>
                <a href="/explore" class="nav-link">Esplora</a>
            </div>

            <a href="/" class="logo">CHRONICLE</a>

            <div class="nav-right">

                <!-- Icona Ricerca -->
                <a href="#search" class="search-icon">🔍</a>

                <!-- Non loggato -->
                <div class="logged-out">
                    <a href="/login" class="nav-link">Login</a>
                    <a href="/register" class="btn-outline">Registrati</a>
                </div>

                <!-- Loggato -->
                <div class="logged-in">
                    <a href="/write" class="btn-primary">Scrivi</a>
                    <a href="/profile" class="nav-link">Profilo</a>
                    <a href="/logout" class="nav-link">Logout</a>
                </div>

            </div>
        </nav>
        <!-- Fine Navbar -->

        <!-- Overlay Ricerca -->
        <div id="search" class="search-overlay">
            <a href="#" style="position:absolute;width:100%;height:100%;"></a>

            <div class="search-box">
                <input type="text" placeholder="Cerca articoli, utenti, tag...">
            </div>
        </div>
        <!-- Fine Overlay di Ricerca -->

    </div>

    <!-- FRAGMENT FOOTER -->
    <footer th:fragment="footer" class="bg-white border-top py-5 mt-auto">
        <div class="container">

            <div class="row mb-4">

                <!-- Brand -->
                <div class="col-md-4 mb-4 mb-md-0">
                    <a href="/" class="text-decoration-none fw-bold fs-5 letter-spacing-1" style="color: var(--primary);">CHRONICLE</a>
                    <p class="text-muted mt-2" style="font-size: 13px;">Il tuo spazio per leggere, scrivere e
                        condividere storie.</p>
                </div>

                <!-- Esplora -->
                <div class="col-6 col-md-2 mb-4 mb-md-0">
                    <h6 class="text-uppercase text-muted fw-semibold mb-3"
                        style="font-size: 11px; letter-spacing: 1px;">Esplora</h6>
                    <a href="/explore" class="d-block text-decoration-none text-dark mb-2 small">Articoli</a>
                    <a href="/tags" class="d-block text-decoration-none text-dark mb-2 small">Tag</a>
                    <a href="/authors" class="d-block text-decoration-none text-dark mb-2 small">Autori</a>
                </div>

                <!-- Account -->
                <div class="col-6 col-md-2 mb-4 mb-md-0">
                    <h6 class="text-uppercase text-muted fw-semibold mb-3" style="font-size: 11px; letter-spacing: 1px;">Account</h6>
                    <a href="/login" class="d-block text-decoration-none text-dark mb-2 small">Login</a>
                    <a href="/register" class="d-block text-decoration-none text-dark mb-2 small">Registrati</a>
                    <a href="/profile" class="d-block text-decoration-none text-dark mb-2 small">Profilo</a>
                </div>

                <!-- Seguici -->
                <div class="col-6 col-md-2">
                    <h6 class="text-uppercase text-muted fw-semibold mb-3" style="font-size: 11px; letter-spacing: 1px;">Seguici</h6>
                    <a href="#" class="d-block text-decoration-none text-dark mb-2 small">Twitter</a>
                    <a href="#" class="d-block text-decoration-none text-dark mb-2 small">Instagram</a>
                    <a href="#" class="d-block text-decoration-none text-dark mb-2 small">LinkedIn</a>
                </div>

            </div>

            <!-- Bottom -->
            <div class="border-top pt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <span class="text-muted" style="font-size: 12px;">© 2026 Chronicle. Tutti i diritti riservati.</span>
                <div class="d-flex gap-3">
                    <a href="#" class="text-muted text-decoration-none" style="font-size: 12px;">Privacy</a>
                    <a href="#" class="text-muted text-decoration-none" style="font-size: 12px;">Termini</a>
                    <a href="#" class="text-muted text-decoration-none" style="font-size: 12px;">Cookie</a>
                </div>
            </div>

        </div>
    </footer>













    <!-- Fragment Bootstrap Script -->
    <script th:fragment="bootstrapScript"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
