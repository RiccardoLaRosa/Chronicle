<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org">

<!-- HEAD -->

<head th:replace="~{index :: head}"></head>

<body>

    <!-- HEAD NAVBAR -->
    <div th:replace="~{index :: navbar}"></div>

    <main>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-7 col-lg-6">

                    <!-- Header -->
                    <div class="mb-4">
                        <h2 th:text="${title}" class="fw-semibold fs-4 mb-1"></h2>
                        <p class="text-muted small">Compila il form per inviare la tua richiesta. Il team di Chronicle la esaminerà al più presto.</p>
                    </div>

                    <!-- Form -->
                    <form th:action="@{/operations/career/request/save}" th:object="${careerRequest}" method="post">

                        <!-- Ruolo -->
                        <div class="mb-4">

                            <label for="role" class="form-label fw-semibold text-uppercase small">Ruolo richiesto</label>
                            <select id="role" th:field="*{role}" class="form-select" required>
                                <option value="" disabled selected>Seleziona un ruolo...</option>
                                <option th:each="role:${roles}" th:value="${role.id}" th:text="${#strings.substring(role.name, 5)}"></option>
                            </select>

                            <div class="form-text">
                                <i class="bi bi-info-circle me-1"></i>
                                I Writer pubblicano articoli; i Revisor moderano i contenuti prima della pubblicazione.
                            </div>

                        </div>

                        <!-- Lettera di motivazione -->
                        <div class="mb-4">

                            <label for="body" class="form-label fw-semibold text-uppercase small">Lettera di motivazione</label>
                            <textarea id="body" th:field="*{body}" class="form-control" rows="6" maxlength="1000"
                                placeholder="Raccontaci chi sei, la tua esperienza e perché vuoi collaborare con Chronicle..."
                                required oninput="updateCount(this)"></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <span class="form-text">
                                    <i class="bi bi-pencil me-1"></i>Minimo 100 caratteri.
                                </span>
                                <span id="charCount" class="form-text">0 / 1000</span>
                            </div>
                            
                        </div>

                        <hr class="my-4">

                        <!-- Pulsante -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-main">Invia candidatura</button>
                        </div>

                        <p class="text-center text-muted small mt-3">
                            La tua richiesta sarà visibile solo agli amministratori di Chronicle.
                        </p>

                    </form>

                </div>
            </div>
        </div>
    </main>

    <!-- HEAD FOOTER -->
    <div th:replace="~{index :: footer}"></div>

    <!-- SCRIPT BOOTSTRAP -->
    <script th:replace="~{index :: bootstrapScript}"></script>
    
    <script>
    function updateCount(el) {
        var n = el.value.length;
        var counter = document.getElementById('charCount');
        counter.textContent = n + ' / 1000';
        counter.classList.toggle('text-danger', n > 900);
        }
    </script>
</body>

</html>
